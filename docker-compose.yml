version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: game_platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: game_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # سرویس رابط کاربری دیتابیس
  adminer:
    image: adminer
    container_name: game_platform_adminer
    restart: unless-stopped
    ports:
      - "8081:8080" # دسترسی از طریق پورت 8081 در مرورگر
    depends_on:
      - postgres

volumes:
  postgres_data:
